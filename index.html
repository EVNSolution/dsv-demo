<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clever - DSV Demo</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --canvas: #f5f5f7;
      --surface: #ffffff;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --hairline: #e5e5ea;
      --blue: #0066cc;
      --blue-soft: #e8f2ff;
      --green: #1f8b4c;
      --green-soft: #e9f7ef;
      --future: #d1d5db;
      --risk: #d92d20;
      --risk-soft: #fff0ed;
      --amber: #f79009;
      --amber-soft: #fff7e8;
      --shadow: 0 24px 70px rgba(0, 0, 0, .10);
      --radius: 28px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: var(--canvas); overflow: hidden; }

    button { font: inherit; }
    .page { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
    .top-cluster {
      position: absolute; left: 20px; top: 20px; z-index: 9;
      display: flex; align-items: flex-start; gap: 12px;
      transition: opacity .18s ease;
    }
    .top {
      position: relative; left: auto; top: auto; transform: none; z-index: 5;
      display: grid; grid-template-rows: auto auto; gap: 8px;
      padding: 14px 16px 14px 18px; border-radius: 24px;
      background: rgba(255,255,255,.84); border: 1px solid rgba(255,255,255,.72); box-shadow: var(--shadow); backdrop-filter: blur(18px);
      transition: opacity .18s ease;
    }
    body.risk-banner-active .top-cluster { top: 20px; }
    h1 { margin: 0; font-size: clamp(22px, 2.4vw, 34px); line-height: 1.05; letter-spacing: -.045em; white-space: nowrap; }
    .top-main { display: flex; align-items: center; gap: 14px; flex-wrap: nowrap; white-space: nowrap; }
    .title-row { display: flex; align-items: center; gap: 10px; }
    .destination-mode { padding: 3px; }
    .destination-mode button { min-height: 28px; padding: 0 9px; font-size: 11px; font-weight: 1000; letter-spacing: -.03em; }
    .controls { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; justify-content: flex-start; }
    .speed-control { margin-top: 0; display: grid; grid-template-columns: auto minmax(360px, 1fr) auto auto; gap: 8px; align-items: center; color: var(--muted); font-size: 11px; font-weight: 900; letter-spacing: -.02em; }
    .speed-control input { width: 100%; accent-color: var(--ink); }
    .speed-control b { min-width: 34px; color: var(--ink); text-align: right; }
    .left-tabs {
      position: absolute; left: 20px; top: 152px; transform: none; z-index: 6;
      width: 76px; padding: 8px 6px; display: grid; gap: 8px; align-content: start;
      border-radius: 24px; background: rgba(255,255,255,.82); border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow); backdrop-filter: blur(18px); transition: opacity .18s ease;
    }
    body.risk-banner-active .left-tabs { top: 152px; }
    .main-tab {
      width: 64px; min-height: 52px; border: 0; border-radius: 18px; background: transparent; color: #1d1d1f;
      cursor: pointer; font-size: 15px; font-weight: 900; letter-spacing: -.04em;
    }
    .main-tab.active { background: #000; color: #fff; }
    .tab-line { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-weight: 900; letter-spacing: -.03em; }
    .tab-copy { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .btn {
      min-height: 44px; border: 1px solid var(--hairline); border-radius: 999px; padding: 0 18px;
      background: rgba(255,255,255,.82); color: var(--ink); cursor: pointer;
      transition: transform .18s ease, background .18s ease, opacity .18s ease;
    }
    .btn:active { transform: scale(.97); }
    .btn:focus-visible { outline: 3px solid rgba(0,102,204,.28); outline-offset: 2px; }
    .btn.primary { border: 0; background: var(--blue); color: #fff; font-weight: 700; padding: 0 24px; }
    .btn.danger { border: 0; background: var(--risk); color: #fff; font-weight: 800; padding: 0 24px; }
    .btn[disabled] { cursor: not-allowed; opacity: .58; }
    .segmented { display: inline-flex; padding: 4px; border-radius: 999px; background: var(--canvas); border: 1px solid var(--hairline); }
    .segmented button { min-height: 36px; border: 0; border-radius: 999px; padding: 0 12px; background: transparent; color: var(--muted); cursor: pointer; font-weight: 800; }
    .segmented button.active { background: var(--ink); color: #fff; }

    .grid { display: block; width: 100%; height: 100%; }
    .card { background: rgba(255,255,255,.86); border: 1px solid rgba(255,255,255,.72); border-radius: var(--radius); box-shadow: var(--shadow); backdrop-filter: blur(18px); overflow: hidden; }

    .map-card { position: absolute; inset: 0; min-height: 0; border: 0; border-radius: 0; box-shadow: none; background: #eef3f8; }
    .side-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0; }
    .title { font-size: 19px; font-weight: 800; letter-spacing: -.02em; }
    .sub { color: var(--muted); font-size: 13px; }
    .chip { display: inline-flex; align-items: center; gap: 7px; min-height: 28px; padding: 0 10px; border-radius: 999px; font-size: 12px; font-weight: 800; background: var(--canvas); color: var(--muted); white-space: nowrap; }
    .chip.blue { color: var(--blue); background: var(--blue-soft); }
    .chip.green { color: var(--green); background: var(--green-soft); }
    .chip.risk { color: var(--risk); background: var(--risk-soft); }
    .chip.amber { color: #9a5a00; background: var(--amber-soft); }
    .chip.mini { min-height: 24px; font-size: 11px; color: #3a3a3c; background: #f2f2f7; }
    .dot { width: 7px; height: 7px; border-radius: 99px; background: currentColor; box-shadow: 0 0 0 5px color-mix(in srgb, currentColor 14%, transparent); }

    .map-wrap { position: absolute; inset: 0; overflow: hidden; background: #eef3f8; }
    #map { position: absolute; inset: 0; }
    .maplibregl-control-container { font-family: inherit; }
    .maplibregl-ctrl-attrib { font-size: 11px; }
    .notification-island { position: relative; flex: 0 0 auto; z-index: 9; pointer-events: none; }
    .notification-bell {
      position: relative; width: 58px; height: 58px; border: 1px solid rgba(255,255,255,.78); border-radius: 999px;
      display: grid; place-items: center; background: rgba(255,255,255,.92); color: var(--ink); cursor: pointer; pointer-events: auto;
      box-shadow: 0 18px 46px rgba(0,0,0,.14); backdrop-filter: blur(18px); font-size: 24px;
    }
    .notification-bell.ringing .bell-icon { animation: bellShake .7s cubic-bezier(.36,.07,.19,.97) both; transform-origin: 50% 4px; }
    .notification-count { position: absolute; right: -3px; top: -4px; min-width: 21px; height: 21px; padding: 0 6px; border-radius: 999px; display: grid; place-items: center; background: var(--risk); color: #fff; border: 2px solid #fff; font-size: 11px; font-weight: 1000; line-height: 1; }
    .notification-count[hidden] { display: none !important; }
    .notification-stack {
      position: absolute; right: 0; top: 68px; width: 330px; max-height: min(420px, calc(100vh - 118px)); overflow: auto;
      display: grid; gap: 8px; padding: 12px; border-radius: 22px; background: rgba(255,255,255,.94); border: 1px solid rgba(255,255,255,.78);
      box-shadow: 0 24px 70px rgba(0,0,0,.16); backdrop-filter: blur(18px); pointer-events: auto;
    }
    .notification-stack[hidden] { display: none !important; }
    .notification-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 2px 2px 6px; font-size: 13px; font-weight: 1000; letter-spacing: -.03em; }
    .notification-item { display: grid; grid-template-columns: 26px 1fr; gap: 10px; padding: 11px; border-radius: 17px; background: #fff; border: 1px solid var(--hairline); }
    .notification-item i { width: 26px; height: 26px; border-radius: 999px; display: grid; place-items: center; background: var(--risk-soft); color: var(--risk); font-style: normal; font-weight: 1000; }
    .notification-item b { display: block; color: var(--ink); font-size: 13px; letter-spacing: -.03em; }
    .notification-item span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 800; line-height: 1.35; }
    .notification-actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 6px; margin-top: 2px; }
    .notification-action { min-height: 28px; border: 0; border-radius: 999px; padding: 0 10px; background: #f2f2f7; color: var(--ink); cursor: pointer; font-size: 11px; font-weight: 1000; }
    .notification-action.primary { background: #000; color: #fff; }
    .notification-action.close { width: 28px; padding: 0; background: var(--risk-soft); color: var(--risk); font-size: 16px; }
    .notification-empty { padding: 18px 10px; color: var(--muted); text-align: center; font-size: 12px; font-weight: 900; }
    @keyframes bellShake { 10%, 90% { transform: rotate(-10deg); } 20%, 80% { transform: rotate(12deg); } 30%, 50%, 70% { transform: rotate(-14deg); } 40%, 60% { transform: rotate(14deg); } }

    .side {
      --map-toolbar-clearance: 138px;
      position: absolute; right: 22px; top: 22px; bottom: auto; z-index: 4;
      width: min(370px, calc(100vw - 44px));
      height: clamp(300px, calc(100dvh - 44px - var(--map-toolbar-clearance)), 820px);
      min-height: 0; overflow: visible; padding: 0 0 0 4px;
    }
    .side .card { box-shadow: none; overflow: visible; min-height: 0; }
    .panel { padding: 16px; min-height: 0; }
    @property --destination-row-height {
      syntax: "<length-percentage>";
      inherits: false;
      initial-value: 46%;
    }
    .panel-view {
      --destination-row-height: 46%;
      height: 100%; display: grid;
      grid-template-rows: minmax(0, calc(100% - var(--destination-row-height) - 14px)) minmax(0, var(--destination-row-height));
      gap: 14px; min-height: 0; overflow: visible;
      transition: --destination-row-height .26s cubic-bezier(.2, .8, .2, 1), grid-template-rows .26s cubic-bezier(.2, .8, .2, 1);
    }
    .panel-view.destination-collapsed { --destination-row-height: 98px; }
    .expand-card { position: relative; display: flex; flex-direction: column; min-height: 0; }
    .card-tools { display: inline-flex; align-items: center; gap: 8px; }
    .panel-toggle { min-height: 28px; border: 0; border-radius: 999px; padding: 0 10px; background: #f2f2f7; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 900; }
    .panel-toggle.active { background: #000; color: #fff; }
    .left-expansion {
      position: absolute; right: calc(100% + 14px); top: 0; width: 360px; max-height: min(520px, calc(100vh - 44px));
      padding: 16px; border-radius: 24px; background: rgba(255,255,255,.90); border: 1px solid rgba(255,255,255,.76);
      backdrop-filter: blur(18px); overflow: auto; display: none;
    }
    .left-expansion.temperature-expansion { width: 540px; height: min(720px, calc(100vh - 88px)); max-height: min(720px, calc(100vh - 88px)); overflow: hidden; }
    #destinationCard .left-expansion { top: auto; bottom: 0; max-height: min(680px, calc(100vh - 88px)); }
    .expand-card.expanded .left-expansion { display: grid; gap: 12px; }
    .expand-card.expanded .temperature-expansion { grid-template-rows: auto auto auto auto minmax(0, 1fr); }
    .expansion-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-weight: 900; letter-spacing: -.03em; }
    .temp-kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .temp-kpi { padding: 8px 9px; border: 1px solid var(--hairline); border-radius: 14px; background: #fff; }
    .temp-kpi span { display: block; color: var(--muted); font-size: 10px; font-weight: 900; letter-spacing: -.02em; }
    .temp-kpi b { display: block; margin-top: 1px; color: var(--ink); font-size: 16px; font-weight: 1000; letter-spacing: -.04em; }
    .temp-kpi.risk b { color: var(--risk); }
    .temp-graph { width: 100%; height: 286px; display: block; border-radius: 20px; background: #fbfbfd; border: 1px solid var(--hairline); }
    .axis-note { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; font-weight: 800; }
    .event-log-title { display:flex; align-items:center; justify-content:space-between; gap:8px; color:var(--ink); font-size:12px; font-weight:1000; letter-spacing:-.03em; }
    .temperature-expansion .event-log { min-height:0; overflow:auto; padding-right:4px; align-content:start; overscroll-behavior:contain; }
    .event-log, .note-list { display: grid; gap: 8px; }
    .log-row, .note-row { display: grid; grid-template-columns: auto 1fr; gap: 8px; align-items: start; padding: 7px 8px; border: 1px solid var(--hairline); border-radius: 13px; background: #fff; font-size: 11px; color: var(--muted); }
    .log-row b, .note-row b { display: block; color: var(--ink); font-size: 11px; }
    .log-row i, .note-row i { width: 22px; height: 22px; border-radius: 999px; display: grid; place-items: center; font-style: normal; font-size: 10px; font-weight: 900; background: var(--canvas); color: var(--muted); }
    .log-row.arrival i { background: var(--blue-soft); color: var(--blue); }
    .log-row.planned i { background: #f2f2f7; color: #6e6e73; }
    .log-row.warn i { background: var(--amber-soft); color: #9a5a00; }
    .log-row.risk i { background: var(--risk-soft); color: var(--risk); }
    .log-row.resolved i, .note-row.done i { background: var(--green-soft); color: var(--green); }
    .note-row.warn i { background: var(--amber-soft); color: #9a5a00; }
    .note-section-title { margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 1000; letter-spacing: -.02em; }
    .cargo-note-list .note-row { grid-template-columns: auto 1fr auto; align-items: center; }
    .cargo-note-list em { justify-self: end; min-width: 32px; font-style: normal; color: var(--ink); font-size: 11px; font-weight: 1000; text-align: right; }
    [hidden] { display: none !important; }
    .page-content {
      position: absolute; left: 118px; right: 22px; top: 146px; bottom: 22px; z-index: 3; overflow: auto;
      padding: 28px; border-radius: 30px; background: rgba(255,255,255,.94); border: 1px solid rgba(255,255,255,.72); backdrop-filter: blur(18px);
    }
    .page-content.dynamic-page { display:flex; flex-direction:column; overflow:hidden; padding:clamp(18px, 1.5vw, 28px); }
    .page-hero { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:18px; }
    .page-content.dynamic-page .page-hero { flex:0 0 auto; margin-bottom:clamp(12px, 1.15vh, 18px); }
    .page-hero h2 { margin:0; font-size:34px; letter-spacing:-.05em; }
    .page-hero p { margin:8px 0 0; color:var(--muted); font-size:14px; }
    .work-toolbar { display:flex; justify-content:flex-end; gap:6px; flex-wrap:wrap; margin:0; }
    .work-toolbar .btn { min-height:34px; padding:0 12px; font-size:13px; }
    .action-panel { margin:0 0 16px; padding:14px; border:1px solid var(--hairline); border-radius:18px; background:#fff; color:var(--muted); font-size:13px; }
    .page-content.dynamic-page .action-panel { flex:0 0 auto; }
    .upload-drop { min-height:126px; border:1px dashed #c7c7cc; border-radius:18px; background:#f5f5f7; display:grid; place-items:center; text-align:center; padding:22px; }
    .upload-drop strong { display:block; margin-bottom:6px; color:var(--ink); font-size:16px; }
    .upload-sheet { min-height:126px; border-radius:18px; background:#f5f5f7; padding:14px; }
    .upload-sheet-head { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .sheet-scroll { max-height:360px; overflow:auto; margin-top:10px; border:1px solid #d1d5db; background:#fff; }
    .upload-sheet .page-table { margin-top:0; background:#fff; border-collapse:collapse; table-layout:fixed; }
    .upload-sheet .page-table th { background:#eef0f3; color:#4b5563; border:1px solid #d1d5db; text-align:center; }
    .upload-sheet .page-table td { border:1px solid #d1d5db; padding:0; }
    .sheet-row { width:34px; background:#eef0f3; color:#6b7280; text-align:center !important; vertical-align:middle; font-size:12px; font-weight:800; }
    .sheet-cell { min-width:70px; min-height:30px; padding:7px 8px; cursor:text; background:#fff; }
    .sheet-cell:hover { background:#f8fbff; }
    .sheet-cell:focus { outline:2px solid #107c41; outline-offset:-2px; background:#fff; }
    .action-panel b { color:var(--ink); }
    .action-panel .btn { min-height:34px; padding:0 12px; margin:8px 6px 0 0; }
    .page-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; align-items:start; }
    .page-content.dynamic-page .page-grid,
    .page-content.dynamic-page .courier-grid {
      flex:1 1 auto; min-height:0; height:auto; align-items:stretch; grid-auto-rows:minmax(0, 1fr);
      transition:grid-template-columns .24s ease, grid-template-rows .24s ease, gap .24s ease;
    }
    .page-panel { border:1px solid var(--hairline); border-radius:24px; background:#fff; padding:20px; }
    .page-content.dynamic-page .page-panel {
      min-height:0; overflow:hidden; display:flex; flex-direction:column;
      transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }
    .page-content.dynamic-page .page-panel:hover { transform:translateY(-1px); border-color:rgba(0,0,0,.12); }
    .page-panel > .tab-line:first-child,
    .page-panel > .courier-detail-head:first-child,
    .page-panel > .work-section > .tab-line:first-child,
    .page-panel > .work-stack > .work-section > .tab-line:first-child,
    .page-panel > .work-stack > details.work-section > summary {
      margin: -6px -6px 14px; padding: 10px 12px; border-radius: 17px;
      background: linear-gradient(180deg, #f7f8fa 0%, #eef0f4 100%); border: 1px solid rgba(229,229,234,.86);
    }
    .page-panel > .courier-detail-head:first-child { margin-bottom: 16px; }
    .page-panel.wide { grid-column: 1 / -1; }
    .page-table { width:100%; border-collapse:collapse; margin-top:14px; font-size:14px; }
    .page-table th, .page-table td { text-align:left; padding:12px 8px; border-bottom:1px solid var(--hairline); }
    .page-table th { color:var(--muted); font-size:12px; }
    .record-scroll { max-height:420px; overflow:auto; margin-top:14px; border:1px solid var(--hairline); border-radius:18px; }
    .page-content.dynamic-page .record-scroll { flex:1 1 auto; min-height:0; max-height:none; }
    .record-scroll .page-table { margin-top:0; }
    .record-row { cursor:pointer; }
    .record-row:hover, .record-row.active { background:var(--blue-soft); }
    .setting-input { width:110px; min-height:34px; border:1px solid var(--hairline); border-radius:12px; padding:0 10px; font:inherit; }
    .destination-list { display:grid; gap:10px; margin-top:14px; }
    .destination-button { width:100%; border:1px solid var(--hairline); border-radius:16px; background:#fff; padding:8px 12px; text-align:left; cursor:pointer; display:grid; grid-template-columns:1fr auto auto; gap:8px; align-items:center; }
    .destination-button.active { border-color:rgba(0,102,204,.28); background:var(--blue-soft); }
    .destination-button strong { display:flex; align-items:center; gap:8px; font-size:14px; letter-spacing:-.03em; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .destination-button small { min-width:42px; color:var(--muted); font-size:11px; font-weight:800; }
    .destination-button span { color:var(--muted); font-size:12px; }
    .destination-button .assignee { justify-self:end; white-space:nowrap; }
    .destination-button .chip { justify-self:end; }
    .destination-group { display:grid; gap:8px; }
    .destination-group > span { color:var(--muted); font-size:12px; font-weight:800; padding:4px 4px 0; }
    .cargo-item { display:grid; grid-template-columns:30px 1fr auto; gap:12px; align-items:center; padding:12px 0; border-bottom:1px solid var(--hairline); }
    .cargo-item:last-child { border-bottom:0; }
    .work-stack { display:grid; gap:18px; margin-top:16px; }
    .work-section { border-top:1px solid var(--hairline); padding-top:16px; }
    details.work-section summary { display:flex; align-items:center; justify-content:space-between; gap:12px; cursor:pointer; font-weight:900; list-style:none; }
    details.work-section summary::-webkit-details-marker { display:none; }
    .page-content.couriers-page .courier-grid { grid-template-columns:minmax(300px, .82fr) minmax(420px, 1.18fr); }
    .page-content.records-page .page-grid { grid-template-columns:minmax(0, 1fr) minmax(0, 1fr); grid-template-rows:minmax(300px, 1.08fr) minmax(230px, .92fr); }
    .page-content.records-page .page-panel.wide { grid-column:1 / -1; }
    .page-content.settings-page .page-grid { grid-template-columns:repeat(2, minmax(300px, 1fr)); }
    .page-content.settings-page .page-panel .page-table { margin-top:0; }
    .work-three-grid { display:grid; grid-template-columns:minmax(270px,.92fr) minmax(360px,1.12fr) minmax(340px,1fr); gap:16px; align-items:stretch; height:min(720px, calc(100dvh - 264px)); min-height:500px; }
    .page-content.work-page .work-three-grid { flex:1 1 auto; min-height:0; height:auto; grid-auto-rows:minmax(0, 1fr); transition:grid-template-columns .24s ease, gap .24s ease; }
    .work-column { min-height:0; overflow:hidden; display:grid; grid-template-rows:auto minmax(0,1fr); gap:12px; border:1px solid var(--hairline); border-radius:24px; background:#fff; padding:14px; transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease; }
    .page-content.work-page .work-column:hover { transform:translateY(-1px); border-color:rgba(0,0,0,.12); }
    .page-content.work-page .work-column { gap:6px; }
    .work-column.split { grid-template-rows:auto minmax(0,1fr); }

    function courierDeliveryHistory(courier, assignedVehicles = vehiclesForCourier(courier)) {
      const sourceVehicles = assignedVehicles.length ? assignedVehicles : vehicles.slice(0, 1);
      const nowMs = simulatedNowMs();
      const proofStatus = (seed) => {
        const missing = Math.abs(seed) % 5 === 0;
        const partial = Math.abs(seed) % 4 === 0;
        if (missing) return { label: "미비 1건", tone: "amber" };
        if (partial) return { label: "2건 완료", tone: "blue" };
        return { label: "3건 완료", tone: "green" };
      };
      const current = sourceVehicles.flatMap((vehicle) => {
        const doneStops = vehicle.stops.slice(0, Math.min(vehicle.done || 0, vehicle.stops.length));
        return doneStops.map((stop, index) => {
          const arrival = (vehicle.arrivalEvents || []).find((event) => event.stopNo === stop.no);
          const at = arrival?.at || nowMs - (doneStops.length - index) * 9 * 60 * 1000;
          return { at, stop, vehicle, proof: proofStatus(stop.no + index) };
        });
      });
      const seed = Number(String(courier.id).replace(/\D/g, "")) || 1;
      const fallback = Array.from({ length: 8 }, (_, index) => {
        const vehicle = sourceVehicles[index % sourceVehicles.length] || vehicles[(seed + index) % vehicles.length];
        const stop = vehicle.stops[(seed + index * 2) % vehicle.stops.length];
        const at = nowMs - (index + 1) * 24 * 60 * 60 * 1000 - (seed * 11 + index * 17) * 60 * 1000;
        return { at, stop, vehicle, proof: proofStatus(seed + index) };
      });
      return [...current, ...fallback].sort((a, b) => b.at - a.at).slice(0, 8);
    }

    function vehicleProgressScore(vehicle) {
      const total = routeStats(routeOf(vehicle)).total || 1;
      return (vehicle.done * 1000000) + Math.min(total, vehicle.meters || 0);
    }
    function vehicleSortBand(vehicle) {
      const status = vehicleStatus(vehicle).key;
      const departureLeft = departureRemainingMs(vehicle);
      // Fleet ordering rule: route progress remains the primary order for active/completed work.
      // Loading is still a status rule: scheduled loading vehicles with a concrete departure ETA
      // sit above indefinite loading holds instead of sinking to the very bottom.
      if (status === "loading" && Number.isFinite(departureLeft)) return 200;
      if (status === "loading") return 100;
      return 300;
    }
    function loadingEtaSortValue(vehicle) {
      const departureLeft = departureRemainingMs(vehicle);
      if (!Number.isFinite(departureLeft)) return Number.POSITIVE_INFINITY;
      return Math.max(0, departureLeft);
    }
    function sortedVehicles() {
      return [...vehicles].sort((a, b) => {
        const bandDelta = vehicleSortBand(b) - vehicleSortBand(a);
        if (bandDelta) return bandDelta;
        const status = vehicleStatus(a).key;
        if (status === "loading") {
          const etaDelta = loadingEtaSortValue(a) - loadingEtaSortValue(b);
          if (etaDelta) return etaDelta;
        }
        return vehicleProgressScore(b) - vehicleProgressScore(a) || vehicles.indexOf(a) - vehicles.indexOf(b);
      });
    }
    function alertBadge(vehicle) { return vehicle.unacknowledgedRisk ? `<span class="alert-dot" aria-label="미확인 온도 오류">!</span>` : ""; }

      document.querySelectorAll("#fleetList [data-vehicle]").forEach((row) => {

    async function fetchOsrmRoute(vehicle) {
      const waypoints = routeWaypoints(vehicle);
      const coords = waypoints.map((coord) => coord.join(",")).join(";");
      if (routeCache.has(coords)) return routeCache.get(coords);
      const urls = [
        ...(CLEVER_SERVER ? [`${CLEVER_SERVER}/route/v1/driving/${coords}?overview=full&geometries=geojson`] : []),
        `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`
      ];
      window.downloadDemoLog = () => {
        const blob = new Blob([demoLogs.map((log) => JSON.stringify(log)).join("\n")], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = "clever-dsv-demo.log"; a.click(); URL.revokeObjectURL(a.href);
      };
      for (const url of urls) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          const route = payload.routes?.[0]?.geometry?.coordinates;
          const dropoffs = payload.waypoints?.slice(1).map((waypoint) => waypoint.location);
          const legs = payload.routes?.[0]?.legs?.map((leg) => ({ distance: Number(leg.distance) || 0, duration: Number(leg.duration) || 0 })) || [];
          if (route?.length > 1) {
            const result = { route, dropoffs: dropoffs?.length === vehicle.stops.length ? dropoffs : vehicle.stops.map((stop) => stop.coord), legs };
            routeCache.set(coords, result);
            logApi("GET", url, { osrm: CLEVER_SERVER && url.startsWith(CLEVER_SERVER) ? "clever" : "public", origin: ORIGIN.name, vehicle: vehicle.id, points: route.length, dropoffs: result.dropoffs.length, meters: Math.round(routeStats(route).total), fixedSpeedKph: FIXED_SPEED_KPH, firstLegFixedMinutes: legs[0]?.distance ? Number((legs[0].distance / FIXED_SPEED_MPS / 60).toFixed(1)) : null, firstLegOsrmMinutes: legs[0]?.duration ? Number((legs[0].duration / 60).toFixed(1)) : null });
            return result;
          }

      setRisk(!!step.risk, false);
      renderLivePanels();
      logApi("POST", `${CLEVER_SERVER}/demo/gps-temperature/batch`, { sampleIntervalSec: 0.5, batchIntervalSec: 1, realBatchIntervalMs: batchIntervalMs(), updateLevel: state.speedLevel, timeScale: timeScale(), fixedSpeedKph: FIXED_SPEED_KPH, count: batch.length, samples: batch }, step.risk ? "risk" : "");
      if (step.risk) logApi("POST", `${CLEVER_SERVER}/demo/alerts/evaluate`, { alert: "TEMP_HIGH", surfaced: ["notification-island", "vehicle", "fleet-list", "map-layer"] }, "risk");
    }
    function runBatch() { applyBatch(nextBatch()); }
    function restartTimer() {
      clearInterval(state.timer);
      state.timer = null;
      const interval = batchIntervalMs();
      if (state.running && interval > 0) state.timer = setInterval(runBatch, interval);
    }
    function updateSpeedLevel(log = false) {
      state.speedLevel = Number($("speedLevel").value);
      $("speedText").textContent = SPEED_WORDS[state.speedLevel] || `${state.speedLevel}단계`;
      restartTimer();
      if (CUSTOMER_DELIVERY_MODE) renderCustomerOrderCard();
      if (state.activeTab === "control") patchLiveControlPanel();
      if (state.activeTab === "work") patchWorkPageLive();
      if (log) logApi("PATCH", `${CLEVER_SERVER}/demo/simulation/update-level`, { level: state.speedLevel, timeScale: timeScale(), realBatchIntervalMs: batchIntervalMs(), fixedSpeedKph: FIXED_SPEED_KPH });
    }
    function start() {
      if (state.running) return;
      state.running = true; state.forcedRisk = false; state.forcedRiskStartedAt = 0; state.simStartedAt = Date.now(); state.batchNo = 0; state.lastSampleAt = 0;
      applyAllScenarios(state.simStartedAt, true);
      $("startBtn").classList.add("primary"); $("startBtn").classList.remove("danger"); $("startBtn").textContent = "Running"; $("startBtn").disabled = true;
      logApi("POST", `${CLEVER_SERVER}/demo/simulation/start`, { scenario: "gunpo-loading-multi-state", origin: ORIGIN, vehicles: vehicles.length, sampleIntervalSec: 0.5, batchIntervalSec: 1, realBatchIntervalMs: batchIntervalMs(), updateLevel: state.speedLevel, timeScale: timeScale(), fixedSpeedKph: FIXED_SPEED_KPH }, "pending");
      renderSide(); updateMapData();
      restartTimer();
    }
    function reset() {
      clearInterval(state.timer); state.timer = null; state.running = false; state.forcedRisk = false; state.forcedRiskStartedAt = 0; state.riskDismissedUntil = 0; state.notifications = []; state.notificationOpen = false; state.batchNo = 0; state.lastSampleAt = 0; $("startBtn").classList.add("primary"); $("startBtn").classList.remove("danger"); $("startBtn").textContent = "Start Simulation"; $("startBtn").disabled = false;
      state.destinationCollapsed = false;
      state.customerRouteVisible = false;
      applyAllScenarios(Date.now(), true);
      if (CUSTOMER_DELIVERY_MODE) {
        state.selectedVehicleId = CUSTOMER_DELIVERY_DEMO.vehicleId;
        state.selectedCourierId = courierFor(customerVehicle()).id;
        state.selectedStopNo = CUSTOMER_DELIVERY_DEMO.stopNo;
        state.trackingVehicleId = ""; state.spotlightVehicleId = ""; state.driverProfileVisible = false; state.lastTrackingAt = 0; state.lastTrackingSampleAt = 0;
        setRisk(false, false); renderCustomerMode(); updateMapData();
        return;
      }
      state.selectedVehicleId = "depart01"; state.selectedCourierId = courierFor(selectedVehicle()).id; state.selectedStopNo = 1; state.trackingVehicleId = ""; state.spotlightVehicleId = ""; state.driverProfileVisible = false; state.lastTrackingAt = 0; state.lastTrackingSampleAt = 0;
      setRisk(false, false); renderSide(); updateMapData();
    }

    document.querySelectorAll(".main-tab").forEach((button) => button.addEventListener("click", () => setTab(button.dataset.tab)));
    $("view2dBtn").addEventListener("click", () => setMapView("2d"));
    $("view3dBtn").addEventListener("click", () => setMapView("3d"));
    $("destinationPointBtn").addEventListener("click", () => setDestinationDisplayMode("point", true));
    $("destinationMarkerBtn").addEventListener("click", () => setDestinationDisplayMode("marker", true));
    $("startBtn").addEventListener("click", start);
    $("resetBtn").addEventListener("click", reset);
    $("notificationBell").addEventListener("click", () => { state.notificationOpen = !state.notificationOpen; renderNotificationIsland(); });
    $("speedLevel").addEventListener("input", () => updateSpeedLevel(false));
    $("speedLevel").addEventListener("change", () => updateSpeedLevel(true));
    applyAllScenarios(Date.now(), true);
    updateSpeedLevel(false);
    if (CUSTOMER_DELIVERY_MODE) {
      prepareCustomerMode();
      applyDestinationDisplayMode();
      initMap();
    } else {
      renderNotificationIsland();
      applyDestinationDisplayMode();
      setTab("control"); initMap();
    }
  </script>
</body>
</html>
