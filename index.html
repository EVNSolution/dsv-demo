<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clever - DSV Demo</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --canvas: #f5f5f7;
      --surface: #ffffff;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --hairline: #e5e5ea;
      --blue: #0066cc;
      --blue-soft: #e8f2ff;
      --green: #1f8b4c;
      --green-soft: #e9f7ef;
      --future: #d1d5db;
      --risk: #d92d20;
      --risk-soft: #fff0ed;
      --amber: #f79009;
      --amber-soft: #fff7e8;
      --shadow: 0 24px 70px rgba(0, 0, 0, .10);
      --radius: 28px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: var(--canvas); overflow: hidden; }

    button { font: inherit; }
    .page { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
    .top {
      position: absolute; left: 20px; top: 20px; transform: none; z-index: 5;
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px 14px 18px; border-radius: 24px;
      background: rgba(255,255,255,.84); border: 1px solid rgba(255,255,255,.72); box-shadow: var(--shadow); backdrop-filter: blur(18px);
    }
    h1 { margin: 0; font-size: clamp(22px, 2.4vw, 34px); line-height: 1.05; letter-spacing: -.045em; white-space: nowrap; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .speed-control { margin-top: 8px; display: grid; grid-template-columns: auto minmax(210px, 1fr) auto auto; gap: 8px; align-items: center; color: var(--muted); font-size: 11px; font-weight: 900; letter-spacing: -.02em; }
    .speed-control input { width: 100%; accent-color: var(--ink); }
    .speed-control b { min-width: 34px; color: var(--ink); text-align: right; }
    .left-tabs {
      position: absolute; left: 20px; top: 118px; transform: none; z-index: 6;
      width: 76px; padding: 8px 6px; display: grid; gap: 8px; align-content: start;
      border-radius: 24px; background: rgba(255,255,255,.82); border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow); backdrop-filter: blur(18px);
    }
    .main-tab {
      width: 64px; min-height: 52px; border: 0; border-radius: 18px; background: transparent; color: #1d1d1f;
      cursor: pointer; font-size: 15px; font-weight: 900; letter-spacing: -.04em;
    }
    .main-tab.active { background: #000; color: #fff; }
    .tab-line { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-weight: 900; letter-spacing: -.03em; }
    .tab-copy { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .btn {
      min-height: 44px; border: 1px solid var(--hairline); border-radius: 999px; padding: 0 18px;
      background: rgba(255,255,255,.82); color: var(--ink); cursor: pointer;
      transition: transform .18s ease, background .18s ease, opacity .18s ease;
    }
    .btn:active { transform: scale(.97); }
    .btn:focus-visible { outline: 3px solid rgba(0,102,204,.28); outline-offset: 2px; }
    .btn.primary { border: 0; background: var(--blue); color: #fff; font-weight: 700; padding: 0 24px; }
    .btn.danger { border: 0; background: var(--risk); color: #fff; font-weight: 800; padding: 0 24px; }
    .btn[disabled] { cursor: not-allowed; opacity: .58; }
    .segmented { display: inline-flex; padding: 4px; border-radius: 999px; background: var(--canvas); border: 1px solid var(--hairline); }
    .segmented button { min-height: 36px; border: 0; border-radius: 999px; padding: 0 12px; background: transparent; color: var(--muted); cursor: pointer; font-weight: 800; }
    .segmented button.active { background: var(--ink); color: #fff; }

    .grid { display: block; width: 100%; height: 100%; }
    .card { background: rgba(255,255,255,.86); border: 1px solid rgba(255,255,255,.72); border-radius: var(--radius); box-shadow: var(--shadow); backdrop-filter: blur(18px); overflow: hidden; }

    .map-card { position: absolute; inset: 0; min-height: 0; border: 0; border-radius: 0; box-shadow: none; background: #eef3f8; }
    .side-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0; }
    .title { font-size: 19px; font-weight: 800; letter-spacing: -.02em; }
    .sub { color: var(--muted); font-size: 13px; }
    .chip { display: inline-flex; align-items: center; gap: 7px; min-height: 28px; padding: 0 10px; border-radius: 999px; font-size: 12px; font-weight: 800; background: var(--canvas); color: var(--muted); white-space: nowrap; }
    .chip.blue { color: var(--blue); background: var(--blue-soft); }
    .chip.green { color: var(--green); background: var(--green-soft); }
    .chip.risk { color: var(--risk); background: var(--risk-soft); }
    .chip.amber { color: #9a5a00; background: var(--amber-soft); }
    .chip.mini { min-height: 24px; font-size: 11px; color: #3a3a3c; background: #f2f2f7; }
    .dot { width: 7px; height: 7px; border-radius: 99px; background: currentColor; box-shadow: 0 0 0 5px color-mix(in srgb, currentColor 14%, transparent); }

    .map-wrap { position: absolute; inset: 0; overflow: hidden; background: #eef3f8; }
    #map { position: absolute; inset: 0; }
    .maplibregl-control-container { font-family: inherit; }
    .maplibregl-ctrl-attrib { font-size: 11px; }
    .toast {
      position: absolute; right: 400px; top: 22px; z-index: 4; width: min(390px, calc(100% - 48px)); padding: 16px; border-radius: 22px;
      background: var(--risk-soft); border: 1px solid rgba(217,45,32,.28); color: var(--risk); box-shadow: 0 24px 60px rgba(217,45,32,.14);
      opacity: 0; transform: translateY(-10px); pointer-events: none; transition: opacity .28s ease, transform .28s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast strong { display:block; margin-bottom: 4px; color: var(--risk); }
    .toast span { color: #7f1d1d; font-size: 13px; line-height: 1.35; }

    .side { position: absolute; right: 22px; top: 22px; bottom: 22px; z-index: 4; width: min(370px, calc(100vw - 44px)); display: grid; gap: 14px; align-content: start; overflow: visible; padding: 0 0 0 4px; }
    .side .card { box-shadow: none; overflow: visible; }
    .panel { padding: 18px; }
    .panel-view { display: grid; gap: 14px; }
    .expand-card { position: relative; }
    .card-tools { display: inline-flex; align-items: center; gap: 8px; }
    .panel-toggle { min-height: 28px; border: 0; border-radius: 999px; padding: 0 10px; background: #f2f2f7; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 900; }
    .panel-toggle.active { background: #000; color: #fff; }
    .left-expansion {
      position: absolute; right: calc(100% + 14px); top: 0; width: 360px; max-height: min(520px, calc(100vh - 44px));
      padding: 16px; border-radius: 24px; background: rgba(255,255,255,.90); border: 1px solid rgba(255,255,255,.76);
      backdrop-filter: blur(18px); overflow: auto; display: none;
    }
    .expand-card.expanded .left-expansion { display: grid; gap: 12px; }
    .expansion-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-weight: 900; letter-spacing: -.03em; }
    .temp-graph { width: 100%; height: 172px; display: block; border-radius: 18px; background: #fafafa; border: 1px solid var(--hairline); }
    .axis-note { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; font-weight: 800; }
    .event-log, .note-list { display: grid; gap: 8px; }
    .log-row, .note-row { display: grid; grid-template-columns: auto 1fr; gap: 9px; align-items: start; padding: 9px; border: 1px solid var(--hairline); border-radius: 15px; background: #fff; font-size: 12px; color: var(--muted); }
    .log-row b, .note-row b { display: block; color: var(--ink); font-size: 12px; }
    .log-row i, .note-row i { width: 24px; height: 24px; border-radius: 999px; display: grid; place-items: center; font-style: normal; font-size: 11px; font-weight: 900; background: var(--canvas); color: var(--muted); }
    .log-row.risk i { background: var(--risk-soft); color: var(--risk); }
    .log-row.resolved i, .note-row.done i { background: var(--green-soft); color: var(--green); }
    .note-row.warn i { background: var(--amber-soft); color: #9a5a00; }
    [hidden] { display: none !important; }
    .page-content {
      position: absolute; left: 118px; right: 22px; top: 118px; bottom: 22px; z-index: 3; overflow: auto;
      padding: 28px; border-radius: 30px; background: rgba(255,255,255,.94); border: 1px solid rgba(255,255,255,.72); backdrop-filter: blur(18px);
    }
    .page-hero { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:22px; }
    .page-hero h2 { margin:0; font-size:34px; letter-spacing:-.05em; }
    .page-hero p { margin:8px 0 0; color:var(--muted); font-size:14px; }
    .work-toolbar { display:flex; justify-content:flex-end; gap:6px; flex-wrap:wrap; margin:0; }
    .work-toolbar .btn { min-height:34px; padding:0 12px; font-size:13px; }
    .action-panel { margin:0 0 16px; padding:14px; border:1px solid var(--hairline); border-radius:18px; background:#fff; color:var(--muted); font-size:13px; }
    .upload-drop { min-height:126px; border:1px dashed #c7c7cc; border-radius:18px; background:#f5f5f7; display:grid; place-items:center; text-align:center; padding:22px; }
    .upload-drop strong { display:block; margin-bottom:6px; color:var(--ink); font-size:16px; }
    .upload-sheet { min-height:126px; border-radius:18px; background:#f5f5f7; padding:14px; }
    .upload-sheet-head { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .sheet-scroll { max-height:360px; overflow:auto; margin-top:10px; border:1px solid #d1d5db; background:#fff; }
    .upload-sheet .page-table { margin-top:0; background:#fff; border-collapse:collapse; table-layout:fixed; }
    .upload-sheet .page-table th { background:#eef0f3; color:#4b5563; border:1px solid #d1d5db; text-align:center; }
    .upload-sheet .page-table td { border:1px solid #d1d5db; padding:0; }
    .sheet-row { width:34px; background:#eef0f3; color:#6b7280; text-align:center !important; vertical-align:middle; font-size:12px; font-weight:800; }
    .sheet-cell { min-width:70px; min-height:30px; padding:7px 8px; cursor:text; background:#fff; }
    .sheet-cell:hover { background:#f8fbff; }
    .sheet-cell:focus { outline:2px solid #107c41; outline-offset:-2px; background:#fff; }
    .action-panel b { color:var(--ink); }
    .action-panel .btn { min-height:34px; padding:0 12px; margin:8px 6px 0 0; }
    .page-grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; align-items:start; }
    .page-panel { border:1px solid var(--hairline); border-radius:24px; background:#fff; padding:20px; }
    .page-panel.wide { grid-column: 1 / -1; }
    .page-table { width:100%; border-collapse:collapse; margin-top:14px; font-size:14px; }
    .page-table th, .page-table td { text-align:left; padding:12px 8px; border-bottom:1px solid var(--hairline); }
    .page-table th { color:var(--muted); font-size:12px; }
    .record-scroll { max-height:420px; overflow:auto; margin-top:14px; border:1px solid var(--hairline); border-radius:18px; }
    .record-scroll .page-table { margin-top:0; }
    .record-row { cursor:pointer; }
    .record-row:hover, .record-row.active { background:var(--blue-soft); }
    .setting-input { width:110px; min-height:34px; border:1px solid var(--hairline); border-radius:12px; padding:0 10px; font:inherit; }
    .destination-list { display:grid; gap:10px; margin-top:14px; }
    .destination-button { width:100%; border:1px solid var(--hairline); border-radius:16px; background:#fff; padding:8px 12px; text-align:left; cursor:pointer; display:grid; grid-template-columns:1fr auto auto; gap:8px; align-items:center; }
    .destination-button.active { border-color:rgba(0,102,204,.28); background:var(--blue-soft); }
    .destination-button strong { display:flex; align-items:center; gap:8px; font-size:14px; letter-spacing:-.03em; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .destination-button small { min-width:42px; color:var(--muted); font-size:11px; font-weight:800; }
    .destination-button span { color:var(--muted); font-size:12px; }
    .destination-button .assignee { justify-self:end; white-space:nowrap; }
    .destination-button .chip { justify-self:end; }
    .destination-group { display:grid; gap:8px; }
    .destination-group > span { color:var(--muted); font-size:12px; font-weight:800; padding:4px 4px 0; }
    .cargo-item { display:grid; grid-template-columns:30px 1fr auto; gap:12px; align-items:center; padding:12px 0; border-bottom:1px solid var(--hairline); }
    .cargo-item:last-child { border-bottom:0; }
    .work-stack { display:grid; gap:18px; margin-top:16px; }
    .work-section { border-top:1px solid var(--hairline); padding-top:16px; }
    details.work-section summary { display:flex; align-items:center; justify-content:space-between; gap:12px; cursor:pointer; font-weight:900; list-style:none; }
    details.work-section summary::-webkit-details-marker { display:none; }

    .fleet, .stops { display: grid; gap: 10px; margin-top: 16px; }
    #fleetList { max-height: 360px; overflow-y: auto; padding-right: 4px; }
    #destinationList { max-height: 184px; overflow-y: auto; padding-right: 4px; }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 12px; border-radius: 20px; border: 1px solid var(--hairline); background: #fff; cursor: pointer; }
    .row.active { border-color: rgba(0,102,204,.24); background: var(--blue-soft); }
    .row.risk { border-color: rgba(217,45,32,.32); background: var(--risk-soft); }
    .plate { width: 54px; height: 42px; border-radius: 13px; background: var(--ink); color: #fff; display: grid; place-items: center; font-size: 12px; font-weight: 800; line-height: 1.05; }
    .vehicle-line { display: inline-flex; align-items: center; gap: 6px; font-weight: 900; letter-spacing: -.03em; }
    .alert-dot { width: 18px; height: 18px; border-radius: 999px; display: inline-grid; place-items: center; background: var(--risk); color: #fff; font-size: 12px; font-weight: 1000; line-height: 1; box-shadow: 0 0 0 3px var(--risk-soft); }
    .row-title { font-weight: 800; letter-spacing: -.02em; }
    .row-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }


    .timeline { display:grid; gap: 10px; margin-top: 14px; }
    .t { display:grid; grid-template-columns: 24px 1fr auto; gap: 10px; align-items:center; color: var(--muted); font-size: 13px; }
    .t i { width: 24px; height: 24px; border-radius: 999px; background: var(--future); color:#fff; display:grid; place-items:center; font-style:normal; font-size:12px; font-weight:800; }
    .t.done i { background: var(--green); }
    .t.now { color: var(--ink); font-weight: 800; }
    .t.now i { background: var(--blue); }
    .t.risk i { background: var(--risk); }
    .t[data-stop] { cursor: pointer; padding: 6px; border-radius: 14px; }
    .t[data-stop].active { background: var(--blue-soft); color: var(--ink); font-weight: 800; }
    .collapse-btn { justify-self: end; margin-top: 12px; border: 0; background: transparent; color: var(--muted); font-weight: 900; cursor: pointer; }
    .collapsed .stops { display: none; }
    .collapsed .collapse-summary { display: block; }
    .collapse-summary { display: none; margin-top: 12px; color: var(--muted); font-size: 13px; }

    @media (max-width: 920px) {
      body { overflow: auto; }
      .page { height: auto; min-height: 100vh; overflow: visible; }
      .left-tabs { left: 12px; right: 12px; top: 12px; bottom: auto; transform: none; width: auto; grid-auto-flow: column; grid-auto-columns: 70px; overflow-x: auto; }
      .top { position: fixed; left: 12px; right: 12px; top: 74px; transform: none; flex-wrap: wrap; }
      .map-card { position: relative; height: 62vh; min-height: 460px; }
      .toast { right: 12px; top: 150px; }
      .side { position: relative; inset: auto; width: auto; margin: 14px 12px 20px; overflow: visible; }
      .left-expansion { position: static; width: auto; max-height: none; margin: 12px 0 0; }
      .page-content { position: relative; inset: auto; margin: 14px 12px 20px; padding: 20px; }
      .page-grid { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
      .row .chip { justify-self: start; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="left-tabs" aria-label="데모 탭">
      <button class="main-tab active" type="button" data-tab="control">관제</button>
      <button class="main-tab" type="button" data-tab="work">업무</button>
      <button class="main-tab" type="button" data-tab="issue">기록</button>
      <button class="main-tab" type="button" data-tab="settings">설정</button>
    </nav>
    <header class="top">
      <div>
        <h1>Clever - DSV Demo</h1>
        <label class="speed-control" aria-label="업데이트 레벨">
          <span>0</span><input id="speedLevel" type="range" min="0" max="10" step="1" value="5"><span>최고속도</span><b id="speedText">표준</b>
        </label>
      </div>
      <div class="controls" aria-label="데모 컨트롤">
        <div class="segmented" aria-label="지도 보기 방식">
          <button id="view2dBtn" type="button" class="active">2D</button>
          <button id="view3dBtn" type="button">3D</button>
        </div>
        <button id="startBtn" class="btn primary">Start Simulation</button>
        <button id="resetBtn" class="btn">Reset</button>
      </div>
    </header>

    <section class="grid" aria-label="배송 관제 데모">
      <article class="card map-card" aria-label="실시간 차량 지도">
        <div class="map-wrap">
          <div id="map" aria-label="OpenFreeMap 서울 배송 지도"></div>
          <div id="toast" class="toast" role="status" aria-live="polite">
            <strong>온도 상승 경고</strong>
            <span id="toastText">차량 특장 온도기록계가 기준 8℃를 초과했습니다. 차량 리스트에 위험 표기합니다.</span>
          </div>
        </div>
      </article>

      <aside class="side" aria-label="배송 상태 패널">
        <div class="panel-view" id="sideContent"></div>

      </aside>
      <section id="pageContent" class="page-content" aria-label="업무 페이지" hidden></section>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const CLEVER_SERVER = location.hostname === "localhost" || location.protocol === "file:" ? "http://localhost:3000" : "";
    const OPENFREEMAP_STYLE = "https://tiles.openfreemap.org/styles/liberty";
    const MAP_TEXT_FONT = ["Noto Sans Regular"];

    const STOP_PIN_PIXEL_RATIO = 2;
    const STOP_PIN_ICON_SIZE = 0.62;
    const FIXED_SPEED_KPH = 40;
    const FIXED_SPEED_MPS = FIXED_SPEED_KPH * 1000 / 3600;
    const DEBUG_LOGS = location.hostname === "localhost" || location.protocol === "file:" || new URLSearchParams(location.search).has("debug");

    const ORIGIN = {

    };
    const ROUTE_TEMPLATES = {

        ["이화여자대학교", [126.945667, 37.561798]], ["공덕역", [126.951646, 37.544317]], ["IFC 서울", [126.924825, 37.525087]],
        ["국회의사당", [126.914166, 37.532600]], ["타임스퀘어", [126.903640, 37.517001]], ["목동종합운동장", [126.883057, 37.530184]],
        ["구로디지털단지역", [126.901530, 37.485266]], ["가산디지털단지역", [126.882668, 37.481589]], ["대항병원, 연세사랑병원", [126.987863, 37.475586]],
      ],
      gangnam: [
        ["강남역", [127.027619, 37.497952]], ["역삼역", [127.036545, 37.500643]], ["선릉역", [127.048980, 37.504503]],
        ["삼성역", [127.063160, 37.508844]], ["코엑스", [127.059159, 37.511823]], ["봉은사", [127.057350, 37.514912]],
        ["청담역", [127.053982, 37.519365]], ["압구정로데오역", [127.040534, 37.527381]], ["강남구청역", [127.041287, 37.517186]],
        ["논현역", [127.021415, 37.511093]], ["신논현역", [127.025060, 37.504598]], ["교대역", [127.014631, 37.493470]],
      ],

        for (let i = startIndex; i < route.length; i += 1) {
          const d = metersBetween(route[i], stop.coord);
          if (d < bestDistance) { bestDistance = d; bestIndex = i; }
        }
        startIndex = Math.max(startIndex, bestIndex);
        lastMeter = Math.max(lastMeter, stats.cumulative[startIndex] || 0);
        return lastMeter;
      });
    }
    function routeLegsOf(vehicle) { return state.routeLegs[vehicle.id] || []; }
    function legMeters(vehicle, legIndex) {
      const stops = stopMeters(vehicle);
      const target = stops[legIndex] ?? routeStats(routeOf(vehicle)).total;
      const previous = legIndex <= 0 ? 0 : (stops[legIndex - 1] || 0);
      return Math.max(1, target - previous);
    }
    function legDistanceMeters(vehicle, legIndex) {
      const osrmDistance = Number(routeLegsOf(vehicle)[legIndex]?.distance);
      if (Number.isFinite(osrmDistance) && osrmDistance > 0) return osrmDistance;
      return legMeters(vehicle, legIndex);
    }
    function legDurationSeconds(vehicle, legIndex) {
      // Scenario contract: every vehicle runs at a fixed 40km/h. OSRM supplies route distance;
      // OSRM duration is logged only as reference, not used for demo ETA.
      return legDistanceMeters(vehicle, legIndex) / FIXED_SPEED_MPS;
    }
    function legSpeedMps(vehicle, legIndex) { return legMeters(vehicle, legIndex) / Math.max(1, legDurationSeconds(vehicle, legIndex)); }
    function remainingLegSeconds(vehicle, legIndex = vehicle.done) {
      const stops = stopMeters(vehicle);
      const target = stops[legIndex] ?? routeStats(routeOf(vehicle)).total;
      const previous = legIndex <= 0 ? 0 : (stops[legIndex - 1] || 0);
      const legLength = Math.max(1, target - previous);
      const completed = Math.max(0, Math.min(legLength, (vehicle.meters || 0) - previous));
      return legDurationSeconds(vehicle, legIndex) * Math.max(0, 1 - completed / legLength);
    }
    function applyVehicleScenario(vehicle, baseMs = Date.now()) {
      const meters = stopMeters(vehicle);
      const target = Math.max(1, Math.min(vehicle.targetStopNo || vehicle.stopNo || 1, vehicle.stops.length));
      const previousMeter = target <= 1 ? 0 : meters[target - 2];
      const targetMeter = meters[target - 1] || routeStats(routeOf(vehicle)).total;
      vehicle.temp = vehicle.baseTemp;
      vehicle.risk = false;
      vehicle.completed = false;
      vehicle.waitUntil = 0;
      vehicle.arrivedAt = 0;
      vehicle.meters = 0;
      vehicle.done = 0;

      if (vehicle.scenario === "loading-hold" || vehicle.scenario === "loading-delay" || vehicle.scenario === "depart-now") return;
      if (vehicle.scenario === "completed") {
        vehicle.done = vehicle.stops.length;
        vehicle.meters = meters.at(-1) || routeStats(routeOf(vehicle)).total;
        vehicle.completed = true;
        return;
      }
      if (vehicle.scenario === "unloading") {
        const stopNo = Math.max(1, Math.min(vehicle.stopNo || 1, vehicle.stops.length));
        vehicle.done = stopNo;
        vehicle.meters = meters[stopNo - 1] || 0;
        vehicle.arrivedAt = baseMs - (vehicle.arrivedAgoMs || 0);
        vehicle.waitUntil = vehicle.arrivedAt + (vehicle.remainingDwellMs || stopDwellMs());
        recordArrivalEvent(vehicle, vehicle.arrivedAt, vehicle.stops[stopNo - 1]);
        return;
      }
      if (vehicle.scenario === "arrive-soon") {
        vehicle.done = target - 1;
        vehicle.meters = Math.max(previousMeter, targetMeter - legSpeedMps(vehicle, target - 1) * (vehicle.arriveInSec || 60));
        return;
      }
      if (vehicle.scenario === "to-stop") {
        vehicle.done = target - 1;
        vehicle.meters = previousMeter + Math.max(0, Math.min(1, vehicle.progress || .5)) * Math.max(0, targetMeter - previousMeter);
      }
    }
    function applyAllScenarios(baseMs = Date.now(), clearLogs = false) {
      vehicles.forEach((vehicle) => {
        if (clearLogs) { vehicle.arrivalEvents = []; vehicle.tempSamples = []; vehicle.tempEvents = []; vehicle.unacknowledgedRisk = false; vehicle.riskAcknowledgedAt = 0; }
        applyVehicleScenario(vehicle, baseMs);
      });
    }
    function updateVehicleDistance(vehicle, sampleAtMs) {
      if (vehicle.completed || vehicle.scenario === "loading-hold") return;
      const departAt = (state.simStartedAt || sampleAtMs) + (vehicle.startDelayMs || 0);
      if (sampleAtMs < departAt) return;
      if (sampleAtMs < vehicle.waitUntil) return;
      if (vehicle.waitUntil && sampleAtMs >= vehicle.waitUntil) { vehicle.waitUntil = 0; vehicle.arrivedAt = 0; }
      if (timeScale() <= 0) return;
      vehicle.meters += legSpeedMps(vehicle, Math.min(vehicle.done, vehicle.stops.length - 1)) * (SAMPLE_MS / 1000);
      const stops = stopMeters(vehicle);
      const arrived = stops.findIndex((m, i) => i + 1 > vehicle.done && vehicle.meters >= m);
      // Arrival signal: when the vehicle crosses the next stop meter, dwell for the configurable unloading time.
      // The vehicle-list pill and destination ETA list are recalculated from the new current stop after this signal.
      // Temperature simulation starts 10 demo seconds after this arrival signal and stays visible for 3 demo minutes.
      if (arrived !== -1) {
        const arrivedStop = vehicle.stops[arrived];
        vehicle.done = arrived + 1; vehicle.arrivedAt = sampleAtMs; vehicle.waitUntil = sampleAtMs + stopDwellMs(); vehicle.meters = stops[arrived];
        recordArrivalEvent(vehicle, sampleAtMs, arrivedStop);
        if (vehicle.done >= vehicle.stops.length || vehicle.completeOnNextArrival) {
          vehicle.completed = true;
          vehicle.waitUntil = 0;
          vehicle.arrivedAt = 0;
        }
      }
      vehicle.meters = Math.min(vehicle.meters, routeStats(routeOf(vehicle)).total);
    }
    function vehiclePosition(vehicle) { return pointAtMeters(routeOf(vehicle), vehicle.meters); }
    function etaText(vehicle) {
      if (vehicle.completed) return "완료";
      if (timeScale() <= 0) return "정지";
      const departureLeft = departureRemainingMs(vehicle);
      if (departureLeft === Infinity) return "상차 대기";
      if (departureLeft > 0) return formatDuration(departureLeft);
      const dwell = dwellRemainingMs(vehicle);
      if (dwell > 0) return formatDuration(dwell);
      const remainingSeconds = Math.max(0, Math.round(remainingLegSeconds(vehicle, Math.min(vehicle.done, vehicle.stops.length - 1))));
      const minutes = Math.floor(remainingSeconds / 60);
      const seconds = remainingSeconds % 60;
      return minutes ? `${minutes}분 ${String(seconds).padStart(2, "0")}초` : `${seconds}초`;
    }
    function stopEtaList(vehicle) {
      if (vehicle.completed) return vehicle.stops.map(() => "완료");
      const departureLeft = departureRemainingMs(vehicle);
      if (departureLeft === Infinity) return vehicle.stops.map(() => "상차 대기");
      let seconds = (departureLeft + dwellRemainingMs(vehicle)) / 1000;
      const stops = stopMeters(vehicle);
      const baseMs = simulatedNowMs();
      let lastEtaMs = baseMs;
      return stops.map((meters, i) => {
        if (i + 1 <= vehicle.done) return "완료";
        if (timeScale() <= 0) return "대기";
        if (i > vehicle.done) seconds += stopDwellMs() / 1000;
        seconds += i === vehicle.done ? remainingLegSeconds(vehicle, i) : legDurationSeconds(vehicle, i);
        lastEtaMs = Math.max(lastEtaMs + 1000, baseMs + seconds * 1000);
        return new Date(lastEtaMs).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
      });
    }

    async function fetchOsrmRoute(vehicle) {
      const waypoints = routeWaypoints(vehicle);
      const coords = waypoints.map((coord) => coord.join(",")).join(";");
      if (routeCache.has(coords)) return routeCache.get(coords);
      const urls = [
        ...(CLEVER_SERVER ? [`${CLEVER_SERVER}/route/v1/driving/${coords}?overview=full&geometries=geojson`] : []),
        `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`
      ];
      window.downloadDemoLog = () => {
        const blob = new Blob([demoLogs.map((log) => JSON.stringify(log)).join("\n")], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = "clever-dsv-demo.log"; a.click(); URL.revokeObjectURL(a.href);
      };
      for (const url of urls) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          const route = payload.routes?.[0]?.geometry?.coordinates;
          const dropoffs = payload.waypoints?.slice(1).map((waypoint) => waypoint.location);
          const legs = payload.routes?.[0]?.legs?.map((leg) => ({ distance: Number(leg.distance) || 0, duration: Number(leg.duration) || 0 })) || [];
          if (route?.length > 1) {
            const result = { route, dropoffs: dropoffs?.length === vehicle.stops.length ? dropoffs : vehicle.stops.map((stop) => stop.coord), legs };
            routeCache.set(coords, result);
            logApi("GET", url, { osrm: CLEVER_SERVER && url.startsWith(CLEVER_SERVER) ? "clever" : "public", origin: ORIGIN.name, vehicle: vehicle.id, points: route.length, dropoffs: result.dropoffs.length, meters: Math.round(routeStats(route).total), fixedSpeedKph: FIXED_SPEED_KPH, firstLegFixedMinutes: legs[0]?.distance ? Number((legs[0].distance / FIXED_SPEED_MPS / 60).toFixed(1)) : null, firstLegOsrmMinutes: legs[0]?.duration ? Number((legs[0].duration / 60).toFixed(1)) : null });
            return result;
          }
        } catch (error) {
          logApi("GET", url, { vehicle: vehicle.id, fallback: true, message: String(error.message || error) }, "pending");
        }
      }
      const result = { route: [], dropoffs: vehicle.stops.map((stop) => stop.coord), legs: [] };
      routeCache.set(coords, result);
      logApi("GET", "OSRM", { vehicle: vehicle.id, routeLayer: "withheld", reason: "no-osrm-route" }, "pending");
      return result;
    }
    async function hydrateRoutes() {
      const groups = vehicles.reduce((acc, vehicle) => {
        const key = routeWaypoints(vehicle).map((coord) => coord.join(",")).join(";");
        (acc[key] ||= []).push(vehicle);
        return acc;
      }, {});
      await Promise.all(Object.values(groups).map(async ([vehicle, ...rest]) => {
        const { route, dropoffs, legs } = await fetchOsrmRoute(vehicle);
        [vehicle, ...rest].forEach((targetVehicle) => {
          state.routes[targetVehicle.id] = route;
          state.dropoffs[targetVehicle.id] = dropoffs;
          state.routeLegs[targetVehicle.id] = legs || [];
          if (!state.running) applyVehicleScenario(targetVehicle, simulatedNowMs());
        });
        updateMapData();
      }));
      if (!state.running) {
        if (state.activeTab === "control" && $("fleetList") && $("destinationList")) patchLiveControlPanel();
        else renderSide();
      }
    }

    function mapData() {

      return {

        routeDone: selectedMapRoute ? routeFeature(completedRoute(selectedMapRoute, selected.meters)) : fc([]),
        routeNext: selectedMapRoute ? routeFeature(remainingRoute(selectedMapRoute, selected.meters)) : fc([]),
        stops: fc(vehicles.flatMap((vehicle) => vehicle.stops.map((stop) => pointFeature(stop.coord, {
          vehicleId: vehicle.id, stopNo: stop.no, label: String(stop.no), pinImage: stopPinImage(vehicle, stop, selected), selected: vehicle.id === selected.id, active: vehicle.id === selected.id && stop.no === state.selectedStopNo,
          done: stop.no <= vehicle.done, risk: stop.no === riskStopNo(vehicle)
        })))),
        dropoffs: fc(vehicles.flatMap((vehicle) => dropoffsOf(vehicle).flatMap((coord, i) => {
          if (i + 1 <= vehicle.done) return [];
          return [pointFeature(coord, { vehicleId: vehicle.id, stopNo: i + 1, label: `정차 ${i + 1}`, selected: vehicle.id === selected.id, active: vehicle.id === selected.id && i + 1 === state.selectedStopNo })];
        }))),

    function createStopPinImage(color, stroke = "#ffffff") {
      if (typeof Path2D === "undefined") return null;
      const width = 40 * STOP_PIN_PIXEL_RATIO, height = 52 * STOP_PIN_PIXEL_RATIO;
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const context = canvas.getContext("2d");
      if (!context) return null;
      context.scale(STOP_PIN_PIXEL_RATIO, STOP_PIN_PIXEL_RATIO);
      const path = new Path2D(STOP_PIN_PATH);
      context.fillStyle = color;
      context.strokeStyle = stroke;
      context.lineJoin = "round";
      context.lineWidth = 3.2;
      context.shadowBlur = 4;
      context.shadowColor = `${color}66`;
      context.shadowOffsetY = 2;
      context.fill(path);

    function ensureStopPinImages() {

    async function loadMapStyle() {
      try {
        const response = await fetch(OPENFREEMAP_STYLE, { cache: "force-cache" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const style = await response.json();
        const patched = { buildingHeights: 0, numericComparisons: 0 };
        const building = style.layers?.find((layer) => layer.id === "building-3d");
        if (building?.paint) {
          building.paint["fill-extrusion-base"] = ["number", ["get", "render_min_height"], 0];
          building.paint["fill-extrusion-height"] = ["number", ["get", "render_height"], 0];
          patched.buildingHeights = 2;
        }
        const patchNumericFilters = (node) => {
          if (!Array.isArray(node)) return node;
          const op = node[0];
          if ([">", ">=", "<", "<="].includes(op) && Array.isArray(node[1]) && node[1][0] === "get" && typeof node[2] === "number") {
            patched.numericComparisons += 1;
            const fallback = op === "<" || op === "<=" ? 1000000000 : -1000000000;
            return [op, ["number", node[1], fallback], node[2]];
          }
          return node.map(patchNumericFilters);
        };
        style.layers?.forEach((layer) => { if (Array.isArray(layer.filter)) layer.filter = patchNumericFilters(layer.filter); });
        window.mapDebugReport = { stylePatched: true, patched };
        if (DEBUG_LOGS) console.info(`[Clever - DSV MapDebug] ${JSON.stringify(window.mapDebugReport)}`);
        return style;
      } catch (error) {
        logApi("GET", OPENFREEMAP_STYLE, { stylePatch: false, message: String(error.message || error) }, "pending");
        return OPENFREEMAP_STYLE;
      }
    }

    async function initMap() {
      if (!globalThis.maplibregl) { logApi("GET", OPENFREEMAP_STYLE, { connected: false, reason: "maplibre script unavailable" }, "risk"); return; }
      const style = await loadMapStyle();
      state.map = new maplibregl.Map({ container: "map", style, center: [126.995, 37.43], zoom: 10.35, pitch: 0, bearing: 0, attributionControl: true, fadeDuration: 0 });
      state.map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "bottom-right");
      state.map.on("load", () => { hideBusStops(); softenBoulevards(); enhance2dBuildings(); addMapLayers(); renderSide(); hydrateRoutes(); logApi("GET", OPENFREEMAP_STYLE, { connected: true, vehicles: 3, stops: 36, hiddenBasePoi: "bus", building2d: true, whiteBoulevards: true }); });
      state.map.on("error", (event) => logApi("MAP", "OpenFreeMap", { error: event?.error?.message || "map error" }, "risk"));
    }

    function setRisk(on, render = true) {
      const riskSource = riskVehicle();
      const wasRisk = !!riskSource.risk;
      riskSource.risk = on;
      // TEMP_HIGH alert is intentionally bound to state.riskVehicleId.
      // If the demo risk target changes, this text follows that vehicle instead of a stale hardcoded name.
      $("toastText").textContent = `${riskSource.plate} 정차 후 특장 온도기록계가 기준 8℃를 초과했습니다. 현재 ${Number(riskSource.temp || 0).toFixed(1)}℃, 온도 상승 시나리오가 3분간 지속됩니다.`;
      $("toast").classList.toggle("show", on);
      state.risk = on;
      if (wasRisk !== on) recordTempEvent(riskSource, on ? "risk" : "resolved", simulatedNowMs());
      updateMapData();
      if (render) renderSide();
    }
    function temperatureSample(time) {
      const vehicle = riskVehicle();
      const baseTemp = vehicle.baseTemp || 4.8;
      if (state.forcedRisk) {
        const startedAt = state.forcedRiskStartedAt || time;
        const elapsed = time - startedAt;
        if (elapsed < TEMP_RISK_DURATION_MS) return { temp: Math.max(vehicle.temp || baseTemp, 8.4 + Math.min(1, elapsed / TEMP_RISK_DURATION_MS) * 2.2), risk: true, phase: "manual-temperature-rise" };
        state.forcedRisk = false; state.forcedRiskStartedAt = 0;
      }
      const sinceArrival = vehicle.arrivedAt ? time - vehicle.arrivedAt : -1;
      const riskElapsed = sinceArrival - TEMP_RISK_DELAY_MS;
      const active = riskElapsed >= 0 && riskElapsed < TEMP_RISK_DURATION_MS;
      if (!active) return { temp: baseTemp, risk: false, phase: sinceArrival >= 0 && sinceArrival < TEMP_RISK_DELAY_MS ? "arrival-wait" : "normal" };
      const progress = Math.min(1, riskElapsed / TEMP_RISK_DURATION_MS);
      return { temp: 8.4 + progress * 2.6, risk: true, phase: "arrival-temperature-rise" };
    }
    function sampleAt(time) {
      const elapsed = Math.max(0, (time - state.simStartedAt) / 1000);
      return {
        at: new Date(time).toISOString(),
        p: Math.min(.9, .03 + elapsed / 240),
        eta: new Date(Date.now() + Math.max(1, 12 - Math.floor(elapsed / 30)) * 60000).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" })
      };
    }
    function nextBatch() {
      const base = state.simStartedAt + state.batchNo * BATCH_MS;
      state.batchNo += 1;
      return Array.from({ length: BATCH_MS / SAMPLE_MS }, (_, i) => sampleAt(base + (i + 1) * SAMPLE_MS));
    }
    function applyBatch(batch) {
      const riskSource = riskVehicle();
      batch.forEach((sample) => {
        const sampleMs = Date.parse(sample.at);
        vehicles.forEach((vehicle) => updateVehicleDistance(vehicle, sampleMs));
        const temperature = temperatureSample(sampleMs);
        sample.temp = Number(temperature.temp.toFixed(1));
        sample.risk = temperature.risk;
        sample.temperaturePhase = temperature.phase;
      });
      const step = batch.at(-1);
      state.lastSampleAt = Date.parse(step.at);
      riskSource.eta = step.eta; riskSource.temp = step.temp;
      recordTempSample(riskSource, state.lastSampleAt, step.temp, step.risk, step.temperaturePhase);
      // Simulation keeps wall-clock ETA text for detail cards, but vehicle-list ETA uses live remaining seconds.
      // Fast demo levels can run at 50ms real intervals; map data updates every batch, while the
      // side panel only patches text/classes so list nodes and click handlers are not recreated.
      setRisk(!!step.risk, false);
      renderLivePanels();
      logApi("POST", `${CLEVER_SERVER}/demo/gps-temperature/batch`, { sampleIntervalSec: 0.5, batchIntervalSec: 1, realBatchIntervalMs: batchIntervalMs(), updateLevel: state.speedLevel, timeScale: timeScale(), fixedSpeedKph: FIXED_SPEED_KPH, count: batch.length, samples: batch }, step.risk ? "risk" : "");
      if (step.risk) logApi("POST", `${CLEVER_SERVER}/demo/alerts/evaluate`, { alert: "TEMP_HIGH", surfaced: ["toast", "vehicle", "fleet-list", "map-layer"] }, "risk");
    }
    function runBatch() { applyBatch(nextBatch()); }
    function restartTimer() {
      clearInterval(state.timer);
      state.timer = null;
      const interval = batchIntervalMs();
      if (state.running && interval > 0) state.timer = setInterval(runBatch, interval);
    }
    function updateSpeedLevel(log = false) {
      state.speedLevel = Number($("speedLevel").value);
      $("speedText").textContent = SPEED_WORDS[state.speedLevel] || `${state.speedLevel}단계`;
      restartTimer();
      if (state.activeTab === "control") patchLiveControlPanel();
      if (log) logApi("PATCH", `${CLEVER_SERVER}/demo/simulation/update-level`, { level: state.speedLevel, timeScale: timeScale(), realBatchIntervalMs: batchIntervalMs(), fixedSpeedKph: FIXED_SPEED_KPH });
    }
    function triggerRiskNow() {
      state.forcedRisk = true; state.forcedRiskStartedAt = simulatedNowMs();
      riskVehicle().temp = Math.max(riskVehicle().temp, 8.4);
      setRisk(true);
      logApi("POST", `${CLEVER_SERVER}/demo/alerts/evaluate`, { alert: "TEMP_HIGH", trigger: "manual-error-button" }, "risk");
    }
    function start() {
      if (state.running) return triggerRiskNow();
      state.running = true; state.forcedRisk = false; state.forcedRiskStartedAt = 0; state.simStartedAt = Date.now(); state.batchNo = 0; state.lastSampleAt = 0;
      applyAllScenarios(state.simStartedAt, true);
      $("startBtn").classList.remove("primary"); $("startBtn").classList.add("danger"); $("startBtn").textContent = "Error";
      logApi("POST", `${CLEVER_SERVER}/demo/simulation/start`, { scenario: "gunpo-loading-multi-state", origin: ORIGIN, vehicles: vehicles.length, sampleIntervalSec: 0.5, batchIntervalSec: 1, realBatchIntervalMs: batchIntervalMs(), updateLevel: state.speedLevel, timeScale: timeScale(), fixedSpeedKph: FIXED_SPEED_KPH }, "pending");
      renderSide(); updateMapData();
      restartTimer();
    }
    function reset() {
      clearInterval(state.timer); state.timer = null; state.running = false; state.forcedRisk = false; state.forcedRiskStartedAt = 0; state.batchNo = 0; state.lastSampleAt = 0; $("startBtn").classList.add("primary"); $("startBtn").classList.remove("danger"); $("startBtn").textContent = "Start Simulation";
      state.destinationCollapsed = false;
      applyAllScenarios(Date.now(), true);
      state.selectedVehicleId = "depart01"; state.selectedStopNo = 1;
      setRisk(false, false); renderSide(); updateMapData();
    }

    document.querySelectorAll(".main-tab").forEach((button) => button.addEventListener("click", () => setTab(button.dataset.tab)));
    $("view2dBtn").addEventListener("click", () => setMapView("2d"));
    $("view3dBtn").addEventListener("click", () => setMapView("3d"));
    $("startBtn").addEventListener("click", start);
    $("resetBtn").addEventListener("click", reset);
    $("speedLevel").addEventListener("input", () => updateSpeedLevel(false));
    $("speedLevel").addEventListener("change", () => updateSpeedLevel(true));
    applyAllScenarios(Date.now(), true);
    updateSpeedLevel(false);
    setTab("control"); initMap();
  </script>
</body>
</html>
